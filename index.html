<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Image Gallery</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

h1{
    padding:20px;
}

/* FILTER BUTTONS */
.filter-buttons{
    margin-bottom:20px;
}

.filter-buttons button{
    padding:10px 20px;
    margin:5px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.filter-buttons button:hover{
    background:#ff4b2b;
}

/* GALLERY GRID */
.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:15px;
    padding:20px;
}

.gallery-item{
    position:relative;
    overflow:hidden;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition: transform 0.4s ease, filter 0.4s ease;
}

/* Hover Effect */
.gallery img:hover{
    transform:scale(1.1);
    filter:brightness(70%);
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
    transition:0.4s;
}

.lightbox.active{
    display:flex;
}

/* Navigation Buttons */
.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    color:white;
    background:rgba(0,0,0,0.5);
    border:none;
    cursor:pointer;
    padding:10px 20px;
}

.prev{ left:30px; }
.next{ right:30px; }

/* Close Button */
.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
    .gallery img{
        height:200px;
    }
    .nav-btn{
        font-size:30px;
    }
}
</style>
</head>

<body>

<h1>Responsive Image Gallery</h1>

<!-- FILTER BUTTONS -->
<div class="filter-buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery">
    <div class="gallery-item" data-category="nature">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>
    <div class="gallery-item" data-category="city">
        <img src="https://picsum.photos/id/1011/600/400">
    </div>
    <div class="gallery-item" data-category="animals">
        <img src="https://picsum.photos/id/1025/600/400">
    </div>
    <div class="gallery-item" data-category="nature">
        <img src="https://picsum.photos/id/1043/600/400">
    </div>
    <div class="gallery-item" data-category="city">
        <img src="https://picsum.photos/id/1031/600/400">
    </div>
    <div class="gallery-item" data-category="animals">
        <img src="https://picsum.photos/id/1062/600/400">
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <button class="nav-btn prev" onclick="changeImage(-1)">❮</button>
    <img id="lightbox-img">
    <button class="nav-btn next" onclick="changeImage(1)">❯</button>
</div>

<script>
let currentIndex = 0;
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

/* Open Lightbox */
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.classList.add("active");
    });
});

/* Show Image */
function showImage(){
    lightboxImg.src = images[currentIndex].src;
}

/* Next / Prev */
function changeImage(step){
    currentIndex += step;
    if(currentIndex < 0) currentIndex = images.length - 1;
    if(currentIndex >= images.length) currentIndex = 0;
    showImage();
}

/* Close */
function closeLightbox(){
    lightbox.classList.remove("active");
}

/* Filter */
function filterImages(category){
    const items = document.querySelectorAll(".gallery-item");
    items.forEach(item => {
        if(category === "all" || item.dataset.category === category){
            item.style.display = "block";
        } else {
            item.style.display = "none";
        }
    });
}
</script>

</body>
</html>
